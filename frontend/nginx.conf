server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — hand every unknown route back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy /api to the Go backend (docker-compose service: backend).
    # No URI on proxy_pass -> nginx forwards the request path verbatim, matching
    # docs/NGINX-EXPECTATIONS.md. Backend routes on /api/v1/calculate directly.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend healthcheck passthrough (useful for docker-compose)
    location = /healthz {
        proxy_pass http://backend:8080/healthz;
    }
}
